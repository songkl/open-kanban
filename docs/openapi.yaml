        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubtaskRequest'
      responses:
        '200':
          description: Subtask created
        '401':
          $ref: '#/components/responses/Unauthorized'

  /subtasks/{id}:
