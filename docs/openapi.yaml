      description: Delete a subtask
      operationId: deleteSubtask
      tags:
        - Subtasks
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subtask deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
