          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task completed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tasks/{id}/attachments:
