          description: Dashboard statistics
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /upload:
    post:
      summary: Upload a file
      description: Upload a file attachment
      operationId: uploadFile
      tags:
        - Files
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                taskId:
                  type: string
      responses:
        '200':
          description: File uploaded
        '401':
          $ref: '#/components/responses/Unauthorized'

  /attachments/{id}:
    delete:
      summary: Delete an attachment
      description: Delete a file attachment
      operationId: deleteAttachment
      tags:
        - Files
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Attachment deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /webhook/notify:
    post:
      summary: Send webhook notification
      description: Trigger webhook notifications
      operationId: webhookNotify
      tags:
        - Webhooks
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook notified
        '401':
          $ref: '#/components/responses/Unauthorized'

  /mcp/my-tasks:
    get:
      summary: Get agent's tasks
      description: Get tasks assigned to the current agent
      operationId: getMyTasks
      tags:
        - MCP
      security:
        - BearerAuth: []
        - SignatureAuth: []
      responses:
        '200':
          description: Agent's tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  total:
                    type: integer
                  userAgent:
                    type: string
