      description: Update subtask title or completion status
      operationId: updateSubtask
      tags:
        - Subtasks
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubtaskRequest'
      responses:
        '200':
          description: Subtask updated
        '401':
