openapi: 3.0.3
info:
  title: Open-Kanban API
  description: |
    Open-Kanban is a self-hosted kanban board API server.
    
    ## Authentication
    
    This API uses Bearer token authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your-token>
    ```
    
    Some endpoints (marked as public) do not require authentication.
    
    ## Signature Verification (IMPORTANT SECURITY INFORMATION)
    
    Protected endpoints support HMAC-SHA256 signature verification for enhanced security. However, **signature verification is DISABLED by default**.
    
    ### Security Warning
    
    When signature verification is disabled (the default), protected endpoints will accept requests without signature verification, even if they are marked as requiring signature verification in this documentation.
    
    ### To Enable Signature Verification
    
    Set the following environment variables:
    
    1. `SIGNATURE_ENABLED=1` - Enable signature verification
    2. `SIGNATURE_SECRETS=access-key-1:secret-key-1,access-key-2:secret-key-2` - Configure access keys and their corresponding secrets (comma-separated key:value pairs)
    
    ### How Signature Verification Works
    
    When enabled, protected endpoints require the following headers:
    
    - `X-Signature`: HMAC-SHA256 signature (hex-encoded)
    - `X-Timestamp`: Unix timestamp of the request (must be within 5 minutes of server time)
    - `X-Access-Key`: The access key identifier
    
    ### Signature Generation
    
    The signature is computed as:
    ```
    HMAC-SHA256(timestamp + method + path + bodyHash, secretKey)
    ```
    
    Where:
    - `timestamp`: Unix timestamp as string
    - `method`: HTTP method (GET, POST, etc.)
    - `path`: Request path (e.g., /api/v1/tasks)
    - `bodyHash`: SHA256 hash of the request body (empty string hash for no body)
    
    ### Example
    
    ```bash
    # Generate signature (pseudo-code)
    TIMESTAMP=$(date +%s)
    METHOD="POST"
    PATH="/api/v1/tasks"
    BODY='{"title":"New Task"}'
    BODY_HASH=$(echo -n "$BODY" | sha256sum | cut -d' ' -f1)
    SIGNATURE=$(echo -n "${TIMESTAMP}${METHOD}${PATH}${BODY_HASH}" | openssl dgst -sha256 -hmac "your-secret-key" | cut -d' ' -f2)
    
    curl -X POST http://localhost:8080/api/v1/tasks \
      -H "Authorization: Bearer <your-token>" \
      -H "X-Signature: $SIGNATURE" \
      -H "X-Timestamp: $TIMESTAMP" \
      -H "X-Access-Key: your-access-key" \
      -H "Content-Type: application/json" \
      -d "$BODY"
    ```
  version: 1.0.0
  contact:
    name: Open-Kanban
    url: https://github.com/songkl/open-kanban

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      description: Public endpoint to check if the server is running
      operationId: healthCheck
      tags:
        - System
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /status:
    get:
      summary: Status check
      description: Public endpoint to check server status
      operationId: statusCheck
      tags:
        - System
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /boards:
    get:
      summary: List all boards
      description: Public endpoint to get all boards
      operationId: getBoards
      tags:
        - Boards
      responses:
        '200':
          description: List of boards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Board'
    post:
      summary: Create a new board
      description: Create a new board with default columns
      operationId: createBoard
      tags:
        - Boards
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoardRequest'
      responses:
        '200':
          description: Board created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /boards/{id}:
    get:
      summary: Get a board by ID
      description: Public endpoint to get board details
      operationId: getBoard
      tags:
        - Boards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Board details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update a board
      description: Update board name and description
      operationId: updateBoard
      tags:
        - Boards
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoardRequest'
      responses:
        '200':
          description: Board updated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a board
      description: Soft delete a board
      operationId: deleteBoard
      tags:
        - Boards
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Board deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /boards/{id}/export:
    get:
      summary: Export board
      description: Export board data as JSON or CSV
      operationId: exportBoard
      tags:
        - Boards
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        '200':
          description: Exported board data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportData'
            text/csv:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /boards/{id}/reset:
    post:
      summary: Reset board
      description: Clear all tasks from a board
      operationId: resetBoard
      tags:
        - Boards
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Board reset
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

