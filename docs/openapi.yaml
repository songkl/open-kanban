      responses:
        '200':
          description: Board copied
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /boards/from-template:
    post:
      summary: Create board from template
      description: Create a new board using a predefined template
      operationId: createBoardFromTemplate
      tags:
        - Boards
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateId:
                  type: string
      responses:
        '200':
          description: Board created from template
        '401':
          $ref: '#/components/responses/Unauthorized'

  /boards/import:
    post:
      summary: Import board
      description: Import board data from JSON
      operationId: importBoard
      tags:
        - Boards
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportBoardRequest'
      responses:
        '200':
          description: Board imported
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Board already exists

  /columns:
    get:
      summary: Get columns
      description: Public endpoint to get columns, optionally filtered by board
      operationId: getColumns
      tags:
        - Columns
      parameters:
        - name: boardId
          in: query
          schema:
            type: string
        - name: positions
          in: query
          description: Comma-separated list of positions
          schema:
            type: string
      responses:
        '200':
          description: List of columns with tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Column'
    post:
      summary: Create a column
      description: Create a new column in a board
      operationId: createColumn
      tags:
        - Columns
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateColumnRequest'
      responses:
        '200':
          description: Column created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Column'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      summary: Update a column
      description: Update column properties
      operationId: updateColumn
      tags:
        - Columns
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateColumnRequest'
      responses:
        '200':
          description: Column updated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Delete a column
      description: Delete a column by ID
      operationId: deleteColumn
      tags:
        - Columns
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Column deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /columns/reorder:
    put:
      summary: Reorder columns
      description: Update the position of multiple columns
      operationId: reorderColumns
      tags:
        - Columns
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderColumnsRequest'
      responses:
        '200':
          description: Columns reordered
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /columns/{columnId}/agent:
    get:
      summary: Get column agent config
      description: Get the agent configuration for a column
      operationId: getColumnAgent
      tags:
        - Columns
      parameters:
        - name: columnId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  agentTypes:
                    type: array
                    items:
                      type: string
    post:
      summary: Set column agent config
      description: Configure which agent types can work on a column
      operationId: setColumnAgent
      tags:
        - Columns
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: columnId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetColumnAgentRequest'
      responses:
        '200':
          description: Agent config set
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Delete column agent config
      description: Remove agent configuration from a column
      operationId: deleteColumnAgent
      tags:
        - Columns
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: columnId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent config deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tasks:
    get:
      summary: Get tasks
      description: Public endpoint to get tasks with optional filters
      operationId: getTasks
      tags:
        - Tasks
      parameters:
        - name: columnId
          in: query
          schema:
            type: string
        - name: boardId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: List of tasks with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  pageCount:
                    type: integer
    post:
      summary: Create a task
      description: Create a new task in a column
      operationId: createTask
      tags:
        - Tasks
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '200':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          description: Rate limit exceeded

  /tasks/{id}:
    get:
      summary: Get a task by ID
      description: Public endpoint to get task details
      operationId: getTask
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: include
          in: query
          description: Include additional data (comments, subtasks)
          schema:
            type: string
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update a task
      description: Update task properties
      operationId: updateTask
      tags:
        - Tasks
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a task
      description: Delete a task
      operationId: deleteTask
      tags:
        - Tasks
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{id}/archive:
    post:
      summary: Archive a task
      description: Archive or unarchive a task
      operationId: archiveTask
      tags:
        - Tasks
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                archived:
                  type: boolean
      responses:
        '200':
          description: Task archived
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tasks/{id}/complete:
    post:
      summary: Complete a task
      description: Mark a task as complete and move it to the next column
      operationId: completeTask
      tags:
        - Tasks
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
