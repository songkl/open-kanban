          $ref: '#/components/responses/Unauthorized'

  /auth/login:
    post:
      summary: Login
      description: Authenticate user and get token
      operationId: login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/init:
    post:
      summary: Initialize
      description: Initialize the server with admin user
      operationId: init
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitRequest'
      responses:
        '200':
          description: Initialization successful
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      summary: Get current user
      description: Get information about the currently authenticated user
      operationId: getMe
      tags:
        - Authentication
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/config:
    get:
      summary: Get app configuration
      description: Get public application configuration
      operationId: getAppConfig
      tags:
        - Authentication
      responses:
        '200':
          description: App configuration
          content:
            application/json:
              schema:
                type: object
    put:
      summary: Update app config
      description: Update application configuration
      operationId: updateAppConfig
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Config updated
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/token:
    get:
      summary: Get tokens
      description: Get all tokens for current user
      operationId: getTokens
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      responses:
        '200':
          description: List of tokens
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create token
      description: Create a new API token
      operationId: createToken
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Token created
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Update token
      description: Update token name or enabled status
      operationId: updateToken
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                enabled:
                  type: boolean
      responses:
        '200':
          description: Token updated
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete token
      description: Delete an API token
      operationId: deleteToken
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      responses:
        '200':
          description: Token deleted
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/activities:
    get:
      summary: Get activities
      description: Get activity log
      operationId: getActivities
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Activity log
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/agents:
    get:
      summary: Get agents
      description: Get all configured agents
      operationId: getAgents
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      responses:
        '200':
          description: List of agents
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create agent
      description: Create a new agent
      operationId: createAgent
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                agentType:
                  type: string
      responses:
        '200':
          description: Agent created
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete agent
      description: Delete an agent
      operationId: deleteAgent
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      responses:
        '200':
          description: Agent deleted
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/agents/reset-token:
    post:
      summary: Reset agent token
      description: Reset an agent's API token
      operationId: resetAgentToken
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentId:
                  type: string
      responses:
        '200':
          description: Token reset
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/users:
    get:
      summary: Get users
      description: Get all users
      operationId: getUsers
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      responses:
        '200':
          description: List of users
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Update user
      description: Update user information or role
      operationId: updateUser
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: User updated
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/users/enabled:
    post:
      summary: Set user enabled
      description: Enable or disable a user
      operationId: setUserEnabled
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                enabled:
                  type: boolean
      responses:
        '200':
          description: User status updated
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/permissions:
    get:
      summary: Get permissions
      description: Get all permissions
      operationId: getPermissions
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      responses:
        '200':
          description: List of permissions
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Set permission
      description: Create or update a permission
      operationId: setPermission
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Permission set
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete permission
      description: Delete a permission
      operationId: deletePermission
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      responses:
        '200':
          description: Permission deleted
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/permissions/columns:
    get:
      summary: Get column permissions
      description: Get permissions for columns
      operationId: getColumnPermissions
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      responses:
        '200':
          description: Column permissions
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Set column permission
      description: Create or update column permission
      operationId: setColumnPermission
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Column permission set
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      summary: Delete column permission
      description: Delete a column permission
      operationId: deleteColumnPermission
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SignatureAuth: []
      responses:
        '200':
          description: Column permission deleted
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    SignatureAuth:
      type: apiKey
      in: header
      name: X-Signature

  schemas:
    Board:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        shortAlias:
          type: string
        deleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            columns:
              type: integer

    CreateBoardRequest:
      type: object
      required:
        - name
      properties:
        id:
          type: string
          maxLength: 100
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        shortAlias:
          type: string
          maxLength: 50

    UpdateBoardRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 1000

    Column:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        position:
          type: integer
        color:
          type: string
        description:
          type: string
        ownerAgentId:
          type: string
        boardId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        agentConfig:
          type: object
          properties:
            agentTypes:
              type: array
              items:
                type: string

    CreateColumnRequest:
      type: object
      required:
        - name
        - boardId
      properties:
        name:
          type: string
          maxLength: 100
        status:
          type: string
          maxLength: 50
        position:
          type: integer
        color:
          type: string
          maxLength: 20
        boardId:
          type: string

    UpdateColumnRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 100
        status:
          type: string
          maxLength: 50
        position:
          type: integer
        color:
          type: string
          maxLength: 20
        description:
          type: string
          maxLength: 500
        ownerAgentId:
          type: string

    ReorderColumnsRequest:
      type: object
      properties:
        boardId:
          type: string
        columns:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              position:
                type: integer

    SetColumnAgentRequest:
      type: object
      properties:
        agentTypes:
          type: array
          items:
            type: string

    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        assignee:
          type: string
        meta:
          type: object
        columnId:
          type: string
        position:
          type: integer
        published:
          type: boolean
        archived:
          type: boolean
        archivedAt:
          type: string
          format: date-time
        agentId:
          type: string
        agentPrompt:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        commentCount:
          type: integer
        subtaskCount:
          type: integer
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/Subtask'

    CreateTaskRequest:
      type: object
      required:
        - title
        - columnId
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          maxLength: 5000
        priority:
          type: string
          enum: [low, medium, high]
        assignee:
          type: string
          maxLength: 100
        meta:
          type: object
        columnId:
          type: string
        position:
          type: integer
        published:
          type: boolean
        agentId:
          type: string
        agentPrompt:
          type: string
          maxLength: 2000

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          maxLength: 5000
        priority:
          type: string
          enum: [low, medium, high]
        assignee:
          type: string
          maxLength: 100
        meta:
          type: object
        columnId:
          type: string
        position:
          type: integer
        published:
          type: boolean
        agentId:
          type: string
        agentPrompt:
          type: string
          maxLength: 2000

    Comment:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        author:
          type: string
        taskId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCommentRequest:
      type: object
      required:
        - taskId
        - content
      properties:
        taskId:
          type: string
        content:
          type: string

    Subtask:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        completed:
          type: boolean
        taskId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateSubtaskRequest:
      type: object
      required:
        - taskId
        - title
      properties:
        taskId:
          type: string
        title:
          type: string

    UpdateSubtaskRequest:
      type: object
      properties:
        title:
          type: string
        completed:
          type: boolean

    Attachment:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        taskId:
          type: string
        createdAt:
          type: string
          format: date-time

    Template:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        data:
          type: object
        createdAt:
          type: string
          format: date-time

    SaveTemplateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        boardId:
          type: string

    ExportData:
      type: object
      properties:
        boardId:
          type: string
        boardName:
          type: string
        exportedAt:
          type: string
          format: date-time
        columns:
          type: array
          items:
            type: object

    ImportBoardRequest:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ImportData'
        boardId:
          type: string
        reset:
          type: boolean

    ImportData:
      type: object
      properties:
        boardName:
          type: string
        columns:
          type: array
          items:
            type: object

    User:
      type: object
      properties:
        id:
          type: string
        nickname:
          type: string
        role:
          type: string
          enum: [ADMIN, MEMBER, VIEWER]
        avatar:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required:
        - nickname
        - password
      properties:
        nickname:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string

    InitRequest:
      type: object
      required:
        - nickname
        - password
      properties:
        nickname:
          type: string
        password:
          type: string

  responses:
    Unauthorized:
      description: Unauthorized - Invalid or missing authentication
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Not logged in

    Forbidden:
      description: Forbidden - User does not have permission
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: No permission

    NotFound:
      description: Not Found - Resource does not exist
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Resource not found

tags:
  - name: System
    description: System endpoints
  - name: Boards
    description: Board management
  - name: Columns
    description: Column management
  - name: Tasks
    description: Task management
  - name: Comments
    description: Comment management
  - name: Subtasks
    description: Subtask management
  - name: Templates
    description: Board templates
  - name: Dashboard
    description: Dashboard statistics
  - name: Files
    description: File uploads and attachments
  - name: Webhooks
    description: Webhook management
  - name: MCP
    description: MCP server endpoints
  - name: Authentication
    description: Authentication and user management
